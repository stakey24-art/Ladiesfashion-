<!DOCTYPE html>
<html>
<head>
  <title>Ladies Fashion Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f8f8;
      text-align: center;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      font-size: 22px;
    }

    .product {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 90%;
      max-width: 350px;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      color: red;
      font-weight: bold;
    }

    .old-price {
      text-decoration: line-through;
      color: gray;
    }

    button {
      background: green;
      color: white;
      padding: 12px 25px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    footer {
      margin-top: 20px;
      padding: 10px;
      background: #222;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    Ladies Fashion Store 👗
  </header>

  <div class="product">
    
    <!-- ✅ Image already added -->
    <img src="https://images.unsplash.com/photo-1593032465171-8c0b9a4a1d2c" alt="Track Pant">

    <h2>Women Combo Track Pant Set</h2>
    
    <p>Stylish & Comfortable Track Pants for Daily Wear, Gym & Travel</p>
    
    <p>
      <span class="old-price">₹799</span><br>
      <span class="price">Offer Price: ₹419</span>
    </p>

    <p>✔ Soft & Stretchable Fabric</p>
    <p>✔ Elastic Waistband</p>
    <p>✔ Trendy Side Stripes Design</p>

    <!-- ✅ WhatsApp button with auto message -->
    <a href="https://wa.me/916306078116?text=Mujhe%20ye%20Track%20Pant%20order%20karna%20hai">
      <button>Order on WhatsApp</button>
    </a>

  </div>

  <footer>
    © 2026 Ladies Fashion | All Rights Reserved
  </footer>

</body>
</html>
